<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Marketing Buzzworthy is a conversion-focused digital agency in Green Bay, WI. We redesign underperforming websites, sharpen positioning, and run growth campaigns that turn traffic into qualified leads." />
  <title>Buzzworthy</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico" />
  <link rel="canonical" href="/" id="canonical-url">
  <link rel="preload" href="/assets/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="modulepreload" href="/assets/js/main.min.js">
  <link rel="preload" as="fetch" href="/api/site" crossorigin="use-credentials">
  <link rel="preload" href="/assets/css/app.min.css" as="style" id="app-css"
    onload="this.onload=null;this.rel='stylesheet'">
  <link rel="stylesheet" href="/assets/css/design-spike.css" id="design-spike-css">
  <noscript>
    <link rel="stylesheet" href="/assets/css/app.min.css">
  </noscript>

  <script>
    (function () {
      var theme = localStorage.getItem('dd-theme') || 'dark';
      var designMode = localStorage.getItem('dd-design-mode') || 'default';
      var safeTheme = theme === 'light' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', designMode === 'spike' ? 'spike' : safeTheme);
      document.documentElement.style.background = safeTheme === 'light' ? '#f6f8fc' : '#0f1626';

      var path = window.location.pathname.replace(/\/+$/, '') || '/';
      var isHomeRoute = path === '/';

      if (isHomeRoute) {
        var homePreload = document.createElement('link');
        homePreload.rel = 'preload';
        homePreload.as = 'fetch';
        homePreload.href = '/content/pages/home.json';
        homePreload.crossOrigin = 'use-credentials';
        document.head.appendChild(homePreload);
      }

    })();
  </script>

</head>
<body>
  <div class="site-shell">
    <div class="site-noise" aria-hidden="true"></div>
    <header id="site-header"></header>
    <main id="app"></main>
    <footer id="site-footer"></footer>
  </div>

  <script type="module" src="/assets/js/main.min.js"></script>
</body>
</html>
