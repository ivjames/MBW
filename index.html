<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Marketing Buzzworthy is a conversion-focused digital agency in Green Bay, WI. We redesign underperforming websites, sharpen positioning, and run growth campaigns that turn traffic into qualified leads." />
  <title>Buzzworthy</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <script>
    (function () {
      var theme = localStorage.getItem('dd-theme') || 'dark';
      var safeTheme = theme === 'light' ? 'light' : 'dark';

      document.documentElement.setAttribute('data-theme', safeTheme);

      var files = [
        ['theme-tokens', '/assets/css/tokens.css'],
        ['theme-utilities', '/assets/css/utilities.css'],
        ['theme-layout', '/assets/css/layout.css'],
        ['theme-components', '/assets/css/components.css']
      ];

      for (var i = 0; i < files.length; i++) {
        var id = files[i][0];
        var href = files[i][1];
        document.write(
          '<link id="' + id + '" rel="stylesheet" href="' + href + '">'
        );
      }
    })();
  </script>

</head>
<body>
  <div class="site-shell">
    <div class="site-noise" aria-hidden="true"></div>
    <header id="site-header"></header>
    <main id="app"></main>
    <footer id="site-footer"></footer>
  </div>

  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
