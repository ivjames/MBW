# MBW performance snippet for nginx.
# Include this inside the `http {}` block in /etc/nginx/nginx.conf.

# gzip compression
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  application/xml+rss
  image/svg+xml
  font/woff2;

# Cache static assets aggressively (filenames should be versioned for long max-age)
map $sent_http_content_type $mbw_immutable {
  default "";
  "text/css" ", immutable";
  "application/javascript" ", immutable";
  "font/woff2" ", immutable";
}

# Optional Brotli (requires nginx Brotli module)
# If `nginx -V` does not include a Brotli module, keep this section commented out.
# brotli on;
# brotli_comp_level 5;
